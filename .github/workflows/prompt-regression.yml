# .github/workflows/prompt-regression.yml
name: Prompt Regression CI

on:
  pull_request:
    paths:
      - "**/prompts/**"
      - "**/evalci.yaml"
      - "example/golden_dataset.json"

permissions:
  pull-requests: write
  issues: write

env:
  EVALCI_DATASET_PATH: example/golden_dataset.json
  EVALCI_CONFIG_PATH: evalci.yaml
  EVALCI_OUTPUT_DIR: eval-outputs
  EVALCI_ENABLED_METRICS: '["semantic_similarity"]'
  EVALCI_THRESHOLD_SEMANTIC_SIMILARITY: "0.55"

jobs:
  eval:
    name: Evaluate Prompt Changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --without dev --no-interaction

      - name: Cache sentence-transformers model
        uses: actions/cache@v4
        id: model-cache
        with:
          path: ~/.cache/huggingface/hub
          key: sentence-transformers-MiniLM-L6-v2-v1

      - name: Download sentence-transformers model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          poetry run python3 -c "
          from sentence_transformers import SentenceTransformer
          print('Downloading all-MiniLM-L6-v2...')
          model = SentenceTransformer('all-MiniLM-L6-v2')
          print('Model ready.')
          "

      - name: Run prompt regression evaluation
        id: eval
        run: |
          mkdir -p "$EVALCI_OUTPUT_DIR"
          poetry run bash scripts/run_eval.sh
        env:
          EVALCI_DATASET_PATH: ${{ env.EVALCI_DATASET_PATH }}
          EVALCI_CONFIG_PATH: ${{ env.EVALCI_CONFIG_PATH }}
          EVALCI_OUTPUT_DIR: ${{ env.EVALCI_OUTPUT_DIR }}
          EVALCI_ENABLED_METRICS: ${{ env.EVALCI_ENABLED_METRICS }}
          EVALCI_THRESHOLD_SEMANTIC_SIMILARITY: ${{ env.EVALCI_THRESHOLD_SEMANTIC_SIMILARITY }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Upload eval reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-reports-${{ github.event.pull_request.number }}
          path: |
            ${{ env.EVALCI_OUTPUT_DIR }}/eval_report.json
            ${{ env.EVALCI_OUTPUT_DIR }}/eval_report.md
          retention-days: 30

      - name: Post evaluation report as PR comment
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = `${{ env.EVALCI_OUTPUT_DIR }}/eval_report.md`;
            let body;
            if (fs.existsSync(path)) {
              body = fs.readFileSync(path, 'utf8');
              if (body.length > 65000) {
                body = body.slice(0, 65000) + '\n\n_Report truncated. Download artifact for full details._';
              }
            } else {
              body = '⚠️ EvalCI: Report not generated. Check workflow logs.';
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('EvalCI Prompt Regression Report')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if regression detected
        if: failure()
        run: |
          echo "::error::EvalCI detected metric regression. Review the PR comment for details."
          exit 1
