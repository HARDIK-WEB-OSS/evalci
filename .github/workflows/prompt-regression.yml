# .github/workflows/prompt-regression.yml
name: Prompt Regression CI

on:
  pull_request:
    paths:
      - "**/prompts/**"
      - "**/evalci.yaml"
      - "example/golden_dataset.json"

env:
  EVALCI_OLLAMA_URL: http://localhost:11434
  EVALCI_DATASET_PATH: example/golden_dataset.json
  EVALCI_CONFIG_PATH: evalci.yaml
  EVALCI_OUTPUT_DIR: eval-outputs
  EVALCI_THRESHOLD_ANSWER_RELEVANCE: "0.50"
  EVALCI_THRESHOLD_FAITHFULNESS: "0.50"
  EVALCI_THRESHOLD_SEMANTIC_SIMILARITY: "0.60" 

permissions:
  pull-requests: write
  issues: write

jobs:
  eval:
    name: Evaluate Prompt Changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Start Ollama service
        run: |
          docker run -d \
            --name ollama \
            -p 11434:11434 \
            -v ollama-data:/root/.ollama \
            ollama/ollama:latest

      - name: Wait for Ollama to be ready
        run: |
          echo "Waiting for Ollama to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready."
              break
            fi
            echo "Attempt $i/30 — sleeping 5s..."
            sleep 5
          done
          curl -sf http://localhost:11434/api/tags || (echo "Ollama did not start in time" && exit 1)

      - name: Pull Ollama judge model
        run: |
          docker exec ollama ollama pull mistral
          echo "Model pull complete."

      - name: Run prompt regression evaluation
        id: eval
        run: |
          mkdir -p "$EVALCI_OUTPUT_DIR"
          poetry run bash scripts/run_eval.sh
        env:
          EVALCI_OLLAMA_URL: ${{ env.EVALCI_OLLAMA_URL }}
          EVALCI_DATASET_PATH: ${{ env.EVALCI_DATASET_PATH }}
          EVALCI_CONFIG_PATH: ${{ env.EVALCI_CONFIG_PATH }}
          EVALCI_COMMIT_SHA: ${{ github.sha }}
          EVALCI_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Upload eval reports as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-reports-${{ github.event.pull_request.number }}
          path: |
            ${{ env.EVALCI_OUTPUT_DIR }}/eval_report.json
            ${{ env.EVALCI_OUTPUT_DIR }}/eval_report.md
          retention-days: 30

      - name: Post evaluation report as PR comment
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = `${{ env.EVALCI_OUTPUT_DIR }}/eval_report.md`;

            let body;
            if (fs.existsSync(path)) {
              body = fs.readFileSync(path, 'utf8');
              // GitHub comments have a 65536 char limit
              if (body.length > 65000) {
                body = body.slice(0, 65000) + '\n\n_...report truncated. See artifact for full report._';
              }
            } else {
              body = '⚠️ EvalCI: Report file not found. Check the workflow logs for errors.';
            }

            // Find and update existing EvalCI comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('EvalCI Prompt Regression Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if regression detected
        if: failure()
        run: |
          echo "::error::EvalCI detected metric regression. Review the PR comment for details."
          exit 1
