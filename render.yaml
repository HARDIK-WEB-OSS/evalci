services:
  - type: web
    name: evalci-backend
    runtime: python
    buildCommand: pip install poetry && poetry install --without dev
    startCommand: poetry run uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: EVALCI_DB_URL
        value: sqlite+aiosqlite:///./evalci.db
      - key: PYTHON_VERSION
        value: 3.11.0
